<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güneş Simülasyonu - Ultra Saydam Halka</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 200, 100, 0.2);
            font-family: 'Courier New', Courier, monospace;
            font-size: 9px;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="ui">Solar Dynamics // Ultra-Transparent Atmosphere // Subtle Glow</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/**
 * CORE VFX SHADER CODE
 */
const noiseShaderCode = `
    precision highp float;
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

    float snoise(vec3 v) {
        const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
        const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i  = floor(v + dot(v, C.yyy) );
        vec3 x0 = v - i + dot(i, C.xxx) ;
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min( g.xyz, l.zxy );
        vec3 i2 = max( g.xyz, l.zxy );
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute( permute( permute(
                   i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                 + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                 + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
        float n_ = 0.142857142857;
        vec3  ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_ );
        vec4 x = x_ *ns.x + ns.yyyy;
        vec4 y = y_ *ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4( x.xy, y.xy );
        vec4 b1 = vec4( x.zw, y.zw );
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
        vec3 p0 = vec3(a0.xy,h.x);
        vec3 p1 = vec3(a0.zw,h.y);
        vec3 p2 = vec3(a1.xy,h.z);
        vec3 p3 = vec3(a1.zw,h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
    }

    float fbm(vec3 p) {
        float v = 0.0;
        float a = 0.5;
        for (int i = 0; i < 6; i++) {
            v += a * snoise(p);
            p *= 2.1;
            a *= 0.5;
        }
        return v;
    }

    float ridge(float h) {
        h = abs(h);
        h = 1.0 - h;
        return h * h * h;
    }

    float solarFilaments(vec3 p) {
        float v = 0.0;
        float a = 0.5;
        float f = 1.0;
        for (int i = 0; i < 5; i++) {
            v += a * ridge(snoise(p * f));
            f *= 2.2;
            a *= 0.5;
        }
        return v;
    }
`;

let scene, camera, renderer, composer, controls, sun, corona, glow, starField;
let clock = new THREE.Clock();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 4.0;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.35; 
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for(let i=0; i<5000; i++) {
        starPos.push((Math.random()-0.5)*1800, (Math.random()-0.5)*1800, -Math.random()*1500);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    starField = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x666666, size: 0.3, transparent: true, opacity: 0.2}));
    scene.add(starField);

    // 1. GÜNEŞ GÖVDESİ
    const sunMat = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 } },
        transparent: true,
        vertexShader: `
            varying vec3 vNormal;
            varying vec3 vPosition;
            varying vec3 vViewDir;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vPosition = position;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewDir = normalize(-mvPosition.xyz);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform float time;
            varying vec3 vNormal;
            varying vec3 vPosition;
            varying vec3 vViewDir;
            ${noiseShaderCode}

            void main() {
                vec3 p = vPosition * 4.5;
                float t = time * 0.12;
                
                float n = fbm(p + vec3(t));
                float filaments = solarFilaments(p * 2.2 - vec3(t * 1.5));
                
                vec3 darkCore = vec3(0.25, 0.08, 0.02); 
                vec3 orangePlasma = vec3(1.0, 0.5, 0.1); 
                vec3 whiteHot = vec3(1.0, 0.95, 0.75);

                vec3 color = mix(darkCore, orangePlasma, n * 0.6 + 0.4);
                color = mix(color, whiteHot, pow(filaments, 3.8) * 1.1);

                float dotNV = max(dot(vNormal, vViewDir), 0.0);
                
                float rim = pow(1.0 - dotNV, 2.5);
                color += vec3(1.0, 0.6, 0.2) * rim * 2.2;

                float alpha = smoothstep(0.0, 0.15, dotNV);
                
                gl_FragColor = vec4(color, alpha);
            }
        `
    });

    sun = new THREE.Mesh(new THREE.SphereGeometry(0.2, 256, 256), sunMat);
    scene.add(sun);

    // 2. İÇ HALKA / KORONA (DAHA DA SAYDAMLAŞTIRILDI)
    const coronaMat = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 } },
        transparent: true,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        depthWrite: false,
        vertexShader: `
            varying vec3 vNormal;
            varying vec3 vWorldPos;
            uniform float time;
            ${noiseShaderCode}
            void main() {
                vNormal = normalize(normalMatrix * normal);
                float d = fbm(normal * 3.5 + vec3(time * 0.12)) * 0.04;
                vec3 pos = position + normal * d;
                vWorldPos = pos;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `,
        fragmentShader: `
            uniform float time;
            varying vec3 vNormal;
            varying vec3 vWorldPos;
            ${noiseShaderCode}
            void main() {
                float vDotN = max(dot(vNormal, vec3(0,0,1)), 0.0);
                float falloff = pow(0.85 - vDotN, 6.0);
                
                float n = fbm(vWorldPos * 8.0 - vec3(time * 0.35));
                float detail = ridge(snoise(vWorldPos * 18.0 + vec3(time * 0.5)));
                
                vec3 color = vec3(1.0, 0.4, 0.05);
                // SAYDAMLAŞTIRMA: Şiddet 0.25'ten 0.08'e düşürüldü
                float intensity = falloff * (0.3 + n * 0.4 + detail * 0.3);
                
                gl_FragColor = vec4(color * 3.5, intensity * 0.08);
            }
        `
    });

    corona = new THREE.Mesh(new THREE.SphereGeometry(0.208, 256, 256), coronaMat);
    scene.add(corona);

    // 3. DIŞ BLUR ALANI (DAHA DA SAYDAMLAŞTIRILDI)
    const glowMat = new THREE.ShaderMaterial({
        transparent: true,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        depthWrite: false,
        fragmentShader: `
            varying vec3 vNormal;
            void main() {
                float intensity = pow(0.7 - dot(vNormal, vec3(0,0,1.0)), 4.0);
                // SAYDAMLAŞTIRMA: Yoğunluk 0.12'den 0.04'e düşürüldü
                gl_FragColor = vec4(1.0, 0.4, 0.05, intensity * 0.04);
            }
        `,
        vertexShader: `
            varying vec3 vNormal;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `
    });
    glow = new THREE.Mesh(new THREE.SphereGeometry(0.38, 128, 128), glowMat);
    scene.add(glow);

    // POST-PROCESSING
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.8, // Bloom şiddeti hafifçe düşürüldü (daha saydam hissettirmesi için)
        0.6, 
        0.9 
    );
    
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    window.addEventListener('resize', onResize);
    animate();
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    let delta = clock.getElapsedTime();

    sun.material.uniforms.time.value = delta;
    corona.material.uniforms.time.value = delta;
    
    sun.rotation.y += 0.00035;
    corona.rotation.y += 0.0008;

    controls.update();
    composer.render();
}

init();
</script>
</body>
</html>
