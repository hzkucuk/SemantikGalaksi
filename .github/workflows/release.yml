name: MSI Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-msi:
    name: Build MSI & Create Release
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Set UTF-8 codepage
        run: chcp 65001
        shell: cmd

      - name: Debug info
        run: echo "Tag=${{ github.ref_name }} Repo=${{ github.repository }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r DataEngine/requirements.txt
          pip install cx_Freeze

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update setup.py version
        shell: pwsh
        run: |
          $content = Get-Content setup.py -Raw -Encoding UTF8
          $content = $content -replace 'version="[^"]*"', "version=`"${{ steps.version.outputs.VERSION }}`""
          Set-Content setup.py -Value $content -Encoding UTF8

      - name: Build Server MSI
        shell: cmd
        run: |
          set SG_BUILD_MODE=server
          python setup.py bdist_msi

      - name: Rename Server MSI
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist -Filter "*.msi" -Recurse | Select-Object -First 1
          if (-not $msi) { Write-Error "Server MSI bulunamadi!"; exit 1 }
          $newName = "SemantikGalaksi-${{ steps.version.outputs.VERSION }}-server-win64.msi"
          Move-Item $msi.FullName "dist\$newName" -Force
          Write-Host "Server MSI: $newName"

      - name: Clean build directory
        shell: pwsh
        run: if (Test-Path "build") { Remove-Item -Recurse -Force "build" }

      - name: Build Client MSI
        shell: cmd
        run: |
          set SG_BUILD_MODE=client
          python setup.py bdist_msi

      - name: Rename Client MSI
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist -Filter "*.msi" -Recurse | Where-Object { $_.Name -notlike "*server*" } | Select-Object -First 1
          if (-not $msi) { Write-Error "Client MSI bulunamadi!"; exit 1 }
          $newName = "SemantikGalaksi-${{ steps.version.outputs.VERSION }}-client-win64.msi"
          Move-Item $msi.FullName "dist\$newName" -Force
          Write-Host "Client MSI: $newName"

      - name: Collect MSI info
        id: msi
        shell: pwsh
        run: |
          $serverMsi = Get-ChildItem -Path dist -Filter "*server*.msi" | Select-Object -First 1
          $clientMsi = Get-ChildItem -Path dist -Filter "*client*.msi" | Select-Object -First 1
          echo "SERVER_PATH=$($serverMsi.FullName)" >> $env:GITHUB_OUTPUT
          echo "SERVER_NAME=$($serverMsi.Name)" >> $env:GITHUB_OUTPUT
          echo "SERVER_SIZE=$([math]::Round($serverMsi.Length/1MB, 2)) MB" >> $env:GITHUB_OUTPUT
          echo "CLIENT_PATH=$($clientMsi.FullName)" >> $env:GITHUB_OUTPUT
          echo "CLIENT_NAME=$($clientMsi.Name)" >> $env:GITHUB_OUTPUT
          echo "CLIENT_SIZE=$([math]::Round($clientMsi.Length/1MB, 2)) MB" >> $env:GITHUB_OUTPUT
          Write-Host "Server: $($serverMsi.Name) ($([math]::Round($serverMsi.Length/1MB, 2)) MB)"
          Write-Host "Client: $($clientMsi.Name) ($([math]::Round($clientMsi.Length/1MB, 2)) MB)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} — SemantikGalaksi"
          body: |
            ## 🕋 SemantikGalaksi ${{ github.ref_name }}

            ### 📦 Kurulum
            | Paket | Boyut | Açıklama |
            |-------|-------|----------|
            | **${{ steps.msi.outputs.SERVER_NAME }}** | ${{ steps.msi.outputs.SERVER_SIZE }} | Tam kurulum — sunucu + tüm veri dosyaları |
            | **${{ steps.msi.outputs.CLIENT_NAME }}** | ${{ steps.msi.outputs.CLIENT_SIZE }} | Terminal kurulumu — JSON veriler sunucudan alınır |

            1. Aşağıdan ihtiyacınıza uygun MSI dosyasını indirin
            2. Çift tıklayarak kurulum sihirbazını başlatın
            3. Masaüstündeki veya Başlat Menüsündeki kısayoldan çalıştırın

            ### ℹ️ Bilgi
            - Python runtime **gömülü** — ayrıca Python kurmanıza gerek yok
            - **Server**: Kendi başına çalışır, tüm veriler dahil
            - **Client**: Ağdaki bir Server'a bağlanır (`config.json` ile `server_ip` ayarlayın)
            - Masaüstü + Başlat Menüsü kısayolları otomatik oluşturulur
            - Denetim Masası → Program Kaldır ile temiz kaldırma

            ### 📋 Değişiklikler
            Detaylı değişiklik listesi için [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) dosyasına bakın.
          files: |
            ${{ steps.msi.outputs.SERVER_PATH }}
            ${{ steps.msi.outputs.CLIENT_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: false
